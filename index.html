<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>规则怪谈×情侣模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
body{background:#0a0a0f;color:#e0e0e0;position:relative}
#atmosphere{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;transition:background 2s,box-shadow 2s}
.mood-dread{background:linear-gradient(160deg,#0a0d1a 0%,#0f1a2e 50%,#0a0a14 100%);box-shadow:inset 0 0 150px rgba(0,20,60,0.8)}
.mood-danger{background:linear-gradient(160deg,#1a0a0a 0%,#2e0f0f 50%,#140a0a 100%);box-shadow:inset 0 0 150px rgba(60,0,0,0.8)}
.mood-tension{background:linear-gradient(160deg,#140a1a 0%,#1a0f2e 50%,#0f0a14 100%);box-shadow:inset 0 0 150px rgba(40,0,60,0.8)}
.mood-intimacy{background:linear-gradient(160deg,#1a1408 0%,#2e2210 50%,#14100a 100%);box-shadow:inset 0 0 120px rgba(60,40,0,0.6)}
.mood-heartbreak{background:linear-gradient(160deg,#121215 0%,#1a1a20 50%,#0e0e12 100%);box-shadow:inset 0 0 150px rgba(20,20,40,0.8)}
.mood-calm{background:linear-gradient(160deg,#0a0f1a 0%,#101828 50%,#0a0d14 100%);box-shadow:inset 0 0 100px rgba(0,10,40,0.6)}
.mood-uncanny{background:linear-gradient(160deg,#0f1a0f 0%,#1a1a0a 50%,#0a140f 100%);box-shadow:inset 0 0 150px rgba(20,40,0,0.7)}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;box-shadow:inset 0 0 100px 40px rgba(0,0,0,0.7);transition:box-shadow 2s}
#game-container{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
#setup-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#setup-screen h1{font-size:1.5em;margin-bottom:8px;color:#c8b8a0;text-shadow:0 0 20px rgba(200,180,160,0.3)}
#setup-screen p.subtitle{font-size:0.85em;color:#666;margin-bottom:30px}
#setup-screen input{width:100%;max-width:320px;padding:12px 16px;margin:6px 0;background:#15151f;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e0;font-size:0.9em;outline:none}
#setup-screen input:focus{border-color:#4a4a6a}
#setup-screen button{margin-top:20px;padding:12px 40px;background:linear-gradient(135deg,#2a2040,#3a2a50);border:1px solid #4a3a6a;border-radius:8px;color:#c8b8d0;font-size:1em;cursor:pointer;transition:all 0.3s}
#setup-screen button:hover{background:linear-gradient(135deg,#3a2a50,#4a3a60);border-color:#6a5a8a}
.setup-label{width:100%;max-width:320px;text-align:left;font-size:0.8em;color:#888;margin-top:12px;margin-bottom:2px}
#title-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:#0a0a0f;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
#title-screen h1{font-size:1.8em;color:#c8b8a0;text-shadow:0 0 30px rgba(200,180,160,0.4);margin-bottom:10px;letter-spacing:2px}
#title-screen p{color:#666;font-size:0.85em;margin-bottom:40px}
#title-screen button{padding:14px 50px;background:transparent;border:1px solid #3a3a4a;border-radius:8px;color:#a0a0b0;font-size:1em;cursor:pointer;transition:all 0.5s;letter-spacing:4px}
#title-screen button:hover{border-color:#6a5a8a;color:#c8b8d0;text-shadow:0 0 10px rgba(200,180,200,0.3)}
#dialogue-area{background:linear-gradient(180deg,transparent,rgba(5,5,10,0.85) 20%,rgba(5,5,10,0.95));padding:20px 16px;padding-bottom:env(safe-area-inset-bottom,10px);border-radius:16px 16px 0 0;min-height:35vh;max-height:55vh;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(10px)}
#speaker-name{font-size:0.8em;color:#a89070;margin-bottom:6px;letter-spacing:1px;opacity:0;transition:opacity 0.5s}
#speaker-name.show{opacity:1}
#dialogue-text{font-size:0.95em;line-height:1.8;color:#d8d8dc;min-height:80px;white-space:pre-wrap;overflow-y:auto;max-height:30vh}
#dialogue-text .cursor{display:inline-block;width:2px;height:1em;background:#a0a0b0;margin-left:2px;animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
#choices-area{margin-top:16px;display:flex;flex-direction:column;gap:8px;opacity:0;transition:opacity 0.5s}
#choices-area.show{opacity:1}
.choice-btn{padding:12px 16px;background:rgba(25,25,40,0.8);border:1px solid #2a2a4a;border-radius:8px;color:#b0b0c0;font-size:0.88em;text-align:left;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(5px)}
.choice-btn:active{background:rgba(50,40,70,0.8);border-color:#6a5a8a;color:#e0d8f0}
#custom-input-area{display:none;margin-top:8px;flex-direction:row;gap:8px}
#custom-input{flex:1;padding:10px 14px;background:rgba(20,20,35,0.9);border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;font-size:0.88em;outline:none}
#custom-input:focus{border-color:#4a4a6a}
#custom-send{padding:10px 16px;background:rgba(40,30,60,0.8);border:1px solid #4a3a6a;border-radius:8px;color:#b0a0c0;font-size:0.88em;cursor:pointer}
#toolbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:flex-end;padding:12px 16px;gap:10px}
.tool-btn{width:36px;height:36px;border-radius:50%;background:rgba(20,20,30,0.7);border:1px solid #2a2a3a;color:#808090;font-size:0.75em;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(5px);transition:all 0.3s}
.tool-btn:active{background:rgba(40,30,60,0.8);border-color:#4a3a6a}
#history-panel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;background:rgba(5,5,10,0.97);display:none;flex-direction:column;padding:20px;padding-top:60px}
#history-panel.show{display:flex}
#history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
#history-header h2{font-size:1.1em;color:#a89070}
#history-close{padding:8px 16px;background:rgba(25,25,40,0.8);border:1px solid #2a2a4a;border-radius:6px;color:#808090;font-size:0.85em;cursor:pointer}
#history-content{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
#history-page{font-size:0.9em;line-height:1.9;color:#c0c0c8;white-space:pre-wrap;text-align:left;overflow-y:auto}
#history-nav{display:flex;justify-content:center;gap:20px;margin-top:20px}
#history-nav button{padding:8px 20px;background:rgba(25,25,40,0.8);border:1px solid #2a2a4a;border-radius:6px;color:#808090;font-size:0.85em;cursor:pointer}
#history-nav button:disabled{opacity:0.3;cursor:default}
#history-page-num{color:#666;font-size:0.8em;align-self:center}
#save-panel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;background:rgba(5,5,10,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#save-panel.show{display:flex}
#save-panel h2{font-size:1.1em;color:#a89070;margin-bottom:20px}
.save-slot{width:100%;max-width:320px;padding:16px;margin:8px 0;background:rgba(20,20,35,0.8);border:1px solid #2a2a4a;border-radius:8px;color:#b0b0c0;font-size:0.85em;cursor:pointer;transition:all 0.3s;text-align:left}
.save-slot:active{border-color:#4a3a6a;background:rgba(30,25,50,0.8)}
.save-slot .slot-title{color:#a89070;margin-bottom:4px}
.save-slot .slot-info{color:#666;font-size:0.8em}
#save-panel-close{margin-top:20px;padding:10px 30px;background:rgba(25,25,40,0.8);border:1px solid #2a2a4a;border-radius:6px;color:#808090;font-size:0.85em;cursor:pointer}
#loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;pointer-events:none;opacity:0;transition:opacity 1s}
#loading-overlay.show{opacity:1;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{background:rgba(10,10,20,0)}50%{background:rgba(10,10,20,0.3)}}
#sound-indicator{position:fixed;bottom:10px;left:10px;z-index:100;font-size:0.7em;color:#444}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
.shake{animation:shake 0.15s ease-in-out 3}
.fade-in{animation:fadeIn 0.8s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="atmosphere" class="mood-calm"></div>
<canvas id="particles"></canvas>
<div id="vignette"></div>
<div id="loading-overlay"></div>
<div id="setup-screen">
<h1>规则怪谈×情侣模拟器</h1>
<p class="subtitle">一个关于规则、恐惧与放不下的人的故事</p>
<div class="setup-label">API 地址</div>
<input type="text" id="api-url" placeholder="https://xxxxx/v1/chat/completions">
<div class="setup-label">API 密钥</div>
<input type="password" id="api-key" placeholder="sk-xxxxxxxx">
<div class="setup-label">模型名称</div>
<input type="text" id="model-name" placeholder="如 claude-sonnet-4-20250514">
<button onclick="saveConfig()">进入</button>
</div>
<div id="title-screen">
<h1>规则怪谈×情侣模拟器</h1>
<p>如果你违反了规则，你会死。<br>如果你看不透她——你可能已经在违反规则了。</p>
<button onclick="startGame()">开始游戏</button>
<button onclick="openLoadPanel()" style="margin-top:12px;padding:10px 30px;font-size:0.85em;letter-spacing:2px">读取存档</button>
</div>
<div id="toolbar" style="display:none">
<div class="tool-btn" onclick="toggleSound()" title="音效">♪</div>
<div class="tool-btn" onclick="openHistory()" title="回看">↑</div>
<div class="tool-btn" onclick="openSavePanel()" title="存档">◆</div>
</div>
<div id="game-container" style="display:none">
<div id="dialogue-area">
<div id="speaker-name"></div>
<div id="dialogue-text"></div>
<div id="choices-area"></div>
<div id="custom-input-area">
<input type="text" id="custom-input" placeholder="输入你想做的或想说的...">
<button id="custom-send" onclick="sendCustom()">发送</button>
</div>
</div>
</div>
<div id="history-panel">
<div id="history-header">
<h2>剧情回看</h2>
<button id="history-close" onclick="closeHistory()">关闭</button>
</div>
<div id="history-content">
<div id="history-page"></div>
</div>
<div id="history-nav">
<button onclick="historyPrev()">上一页</button>
<span id="history-page-num">1/1</span>
<button onclick="historyNext()">下一页</button>
</div>
</div>
<div id="save-panel">
<h2 id="save-panel-title">存档</h2>
<div class="save-slot" onclick="handleSlot(1)"><div class="slot-title">档位 1</div><div class="slot-info" id="slot1-info">空</div></div>
<div class="save-slot" onclick="handleSlot(2)"><div class="slot-title">档位 2</div><div class="slot-info" id="slot2-info">空</div></div>
<div class="save-slot" onclick="handleSlot(3)"><div class="slot-title">档位 3</div><div class="slot-info" id="slot3-info">空</div></div>
<button id="save-panel-close" onclick="closeSavePanel()">关闭</button>
</div>
<div id="sound-indicator">音效：开</div>
<script>

// ===== 全局状态 =====
let config = {url:'',key:'',model:''};
let gameHistory = [];
let messages = [];
let currentMood = 'calm';
let soundEnabled = true;
let isTyping = false;
let historyPageIndex = 0;
let savePanelMode = 'save';

// ===== 音效系统 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}

function playSound(type){
if(!soundEnabled||!audioCtx)return;
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.connect(g);g.connect(audioCtx.destination);
switch(type){
case'choice':o.type='sine';o.frequency.setValueAtTime(220,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(330,audioCtx.currentTime+0.1);g.gain.setValueAtTime(0.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);o.start();o.stop(audioCtx.currentTime+0.15);break;
case'danger':o.type='sawtooth';o.frequency.setValueAtTime(60,audioCtx.currentTime);g.gain.setValueAtTime(0.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.8);o.start();o.stop(audioCtx.currentTime+0.8);break;
case'heartbeat':o.type='sine';o.frequency.setValueAtTime(50,audioCtx.currentTime);g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.3);o.start();o.stop(audioCtx.currentTime+0.3);setTimeout(()=>{if(!audioCtx)return;const o2=audioCtx.createOscillator();const g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);o2.type='sine';o2.frequency.setValueAtTime(50,audioCtx.currentTime);g2.gain.setValueAtTime(0.1,audioCtx.currentTime);g2.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.2);o2.start();o2.stop(audioCtx.currentTime+0.2)},200);break;
case'whisper':o.type='sine';o.frequency.setValueAtTime(800,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(400,audioCtx.currentTime+0.3);g.gain.setValueAtTime(0.03,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.start();o.stop(audioCtx.currentTime+0.4);break;
case'tension':o.type='triangle';o.frequency.setValueAtTime(100,audioCtx.currentTime);o.frequency.linearRampToValueAtTime(150,audioCtx.currentTime+1);g.gain.setValueAtTime(0.06,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+1.2);o.start();o.stop(audioCtx.currentTime+1.2);break;
}}

function playMoodSound(mood){
switch(mood){
case'danger':playSound('danger');break;
case'dread':playSound('tension');break;
case'heartbreak':playSound('whisper');break;
case'tension':playSound('heartbeat');break;
case'uncanny':playSound('tension');break;
}}

// ===== 粒子系统 =====
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
let particles=[];
let particleColor='rgba(150,150,180,';
let particleSpeed=0.3;
let particleCount=30;

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

function initParticles(){
particles=[];
for(let i=0;i<particleCount;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2+0.5,speedY:-(Math.random()*particleSpeed+0.1),speedX:(Math.random()-0.5)*0.2,opacity:Math.random()*0.5+0.1})}}

function updateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.y+=p.speedY;p.x+=p.speedX;
if(p.y<0){p.y=canvas.height;p.x=Math.random()*canvas.width}
ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle=particleColor+p.opacity+')';ctx.fill()});
requestAnimationFrame(updateParticles)}

initParticles();
updateParticles();

// ===== 氛围切换 =====
function setMood(mood){
currentMood=mood;
const atmo=document.getElementById('atmosphere');
atmo.className='mood-'+mood;
switch(mood){
case'dread':particleColor='rgba(100,130,180,';particleSpeed=0.2;particleCount=25;break;
case'danger':particleColor='rgba(180,80,80,';particleSpeed=0.5;particleCount=40;break;
case'tension':particleColor='rgba(140,100,170,';particleSpeed=0.35;particleCount=35;break;
case'intimacy':particleColor='rgba(180,150,100,';particleSpeed=0.15;particleCount=20;break;
case'heartbreak':particleColor='rgba(150,150,160,';particleSpeed=0.1;particleCount=15;break;
case'calm':particleColor='rgba(120,140,170,';particleSpeed=0.2;particleCount=20;break;
case'uncanny':particleColor='rgba(130,170,100,';particleSpeed=0.4;particleCount=45;break;
}
initParticles();
playMoodSound(mood)}

function screenShake(){document.body.classList.add('shake');setTimeout(()=>document.body.classList.remove('shake'),500)}

// ===== 打字机效果 =====
function typeText(text,element,speed=35){
return new Promise(resolve=>{
isTyping=true;
element.innerHTML='';
let i=0;
const cursor='<span class="cursor"></span>';
function type(){
if(i<text.length){
let char=text[i];
if(char==='\n'){element.innerHTML=element.innerHTML.replace(cursor,'')+'\n'+cursor}
else{element.innerHTML=element.innerHTML.replace(cursor,'')+char+cursor}
i++;
let delay=speed;
if(char==='。'||char==='…'||char==='——')delay=speed*4;
else if(char==='，'||char==='；')delay=speed*2;
setTimeout(type,delay)}
else{element.innerHTML=element.innerHTML.replace(cursor,'');isTyping=false;resolve()}}
type()})}

// ===== 显示选项 =====
function showChoices(choices){
const area=document.getElementById('choices-area');
area.innerHTML='';
choices.forEach((c,i)=>{
if(i===3&&c.startsWith('D')){
const btn=document.createElement('div');
btn.className='choice-btn';
btn.textContent=c;
btn.onclick=()=>{document.getElementById('custom-input-area').style.display='flex';btn.style.display='none'};
area.appendChild(btn)}
else{
const btn=document.createElement('div');
btn.className='choice-btn fade-in';
btn.textContent=c;
btn.onclick=()=>selectChoice(c);
area.appendChild(btn)}});
setTimeout(()=>area.classList.add('show'),100)}

function selectChoice(choice){
initAudio();
playSound('choice');
document.getElementById('choices-area').classList.remove('show');
document.getElementById('choices-area').innerHTML='';
document.getElementById('custom-input-area').style.display='none';
sendMessage(choice)}

function sendCustom(){
const input=document.getElementById('custom-input');
const text=input.value.trim();
if(!text)return;
initAudio();
playSound('choice');
input.value='';
document.getElementById('choices-area').classList.remove('show');
document.getElementById('choices-area').innerHTML='';
document.getElementById('custom-input-area').style.display='none';
sendMessage('D. '+text)}

// ===== 系统提示词 =====
let SYSTEM_PROMPT = '';

async function loadPrompt(){
try{
const res=await fetch('./prompt.txt');
if(!res.ok)throw new Error('prompt文件加载失败：'+res.status);
SYSTEM_PROMPT=await res.text();
}catch(e){
SYSTEM_PROMPT='你是规则怪谈×情侣模拟器的DM。请用JSON格式输出：{"speaker":"","text":"","mood":"calm","choices":["A.","B.","C.","D. 自定义"],"sound":"none"}';
}}

// ===== API 通信 =====
async function sendMessage(userInput){
const loading=document.getElementById('loading-overlay');
loading.classList.add('show');
document.getElementById('speaker-name').classList.remove('show');

if(userInput){
messages.push({role:'user',content:userInput});
gameHistory.push({role:'user',content:userInput})}

try{
const res=await fetch(config.url,{
method:'POST',
headers:{'Content-Type':'application/json','Authorization':'Bearer '+config.key},
body:JSON.stringify({model:config.model,messages:[{role:'system',content:SYSTEM_PROMPT},...messages],stream:false})});

if(!res.ok){
const errBody=await res.text().catch(()=>'');
throw new Error(res.status+(errBody?' - '+errBody:''))}

const data=await res.json();
const reply=data.choices[0].message.content;
messages.push({role:'assistant',content:reply});

let parsed;
try{
let jsonStr=reply;
if(jsonStr.includes('```')){jsonStr=jsonStr.replace(/```json?\n?/g,'').replace(/```/g,'').trim()}
parsed=JSON.parse(jsonStr)}
catch(e){
parsed={speaker:'',text:reply,mood:'calm',choices:['A. 继续','B. 观察周围','C. 等待','D. 自定义'],sound:'none'}}

loading.classList.remove('show');
await displayScene(parsed);
gameHistory.push({role:'assistant',content:parsed.text,speaker:parsed.speaker,mood:parsed.mood})}
catch(err){
loading.classList.remove('show');
document.getElementById('dialogue-text').textContent='连接失败：'+err.message;
}}

// ===== 显示场景 =====
async function displayScene(data){
if(data.mood&&data.mood!==currentMood){setMood(data.mood)}
if(data.sound&&data.sound!=='none'){playSound(data.sound)}
if(data.mood==='danger'){screenShake()}

const nameEl=document.getElementById('speaker-name');
if(data.speaker){nameEl.textContent=data.speaker;nameEl.classList.add('show')}
else{nameEl.classList.remove('show');nameEl.textContent=''}

const textEl=document.getElementById('dialogue-text');
await typeText(data.text,textEl);

if(data.choices&&data.choices.length>0){showChoices(data.choices)}}

// ===== 配置与启动 =====
function saveConfig(){
const url=document.getElementById('api-url').value.trim();
const key=document.getElementById('api-key').value.trim();
const model=document.getElementById('model-name').value.trim();
if(!url||!key||!model){alert('请填写完整的API信息');return}
config={url,key,model};
localStorage.setItem('rh_config',JSON.stringify(config));
document.getElementById('setup-screen').style.display='none';
document.getElementById('title-screen').style.display='flex'}

async function startGame(){
document.getElementById('title-screen').style.display='none';
document.getElementById('game-container').style.display='flex';
document.getElementById('toolbar').style.display='flex';
messages=[];
gameHistory=[];
await loadPrompt();
if(!SYSTEM_PROMPT||SYSTEM_PROMPT.length<100){
document.getElementById('dialogue-text').textContent='提示词加载异常（长度：'+(SYSTEM_PROMPT?SYSTEM_PROMPT.length:0)+'），请检查prompt.txt文件是否存在。';
return}
sendMessage('开始游戏')}

window.onload=function(){
const saved=localStorage.getItem('rh_config');
if(saved){config=JSON.parse(saved);
document.getElementById('api-url').value=config.url;
document.getElementById('api-key').value=config.key;
document.getElementById('model-name').value=config.model}}

// ===== 音效开关 =====
function toggleSound(){
soundEnabled=!soundEnabled;
document.getElementById('sound-indicator').textContent='音效：'+(soundEnabled?'开':'关');
if(soundEnabled){initAudio();playSound('choice')}}

// ===== 回看系统 =====
function openHistory(){
const panel=document.getElementById('history-panel');
panel.classList.add('show');
const items=gameHistory.filter(h=>h.role==='assistant');
historyPageIndex=items.length>0?items.length-1:0;
renderHistoryPage()}

function closeHistory(){document.getElementById('history-panel').classList.remove('show')}

function renderHistoryPage(){
const items=gameHistory.filter(h=>h.role==='assistant');
if(items.length===0){document.getElementById('history-page').textContent='暂无剧情记录';document.getElementById('history-page-num').textContent='0/0';return}
const idx=Math.min(historyPageIndex,items.length-1);
historyPageIndex=idx;
const item=items[idx];
const prefix=item.speaker?'【'+item.speaker+'】\n':'';
document.getElementById('history-page').textContent=prefix+item.content;
document.getElementById('history-page-num').textContent=(idx+1)+'/'+items.length}

function historyPrev(){if(historyPageIndex>0){historyPageIndex--;renderHistoryPage()}}
function historyNext(){const items=gameHistory.filter(h=>h.role==='assistant');if(historyPageIndex<items.length-1){historyPageIndex++;renderHistoryPage()}}

// ===== 存档系统 =====
function openSavePanel(){
savePanelMode='save';
document.getElementById('save-panel-title').textContent='存档';
document.getElementById('save-panel').classList.add('show');
updateSlotInfo()}

function openLoadPanel(){
savePanelMode='load';
document.getElementById('save-panel-title').textContent='读取存档';
document.getElementById('save-panel').classList.add('show');
updateSlotInfo()}

function closeSavePanel(){document.getElementById('save-panel').classList.remove('show')}

function updateSlotInfo(){
for(let i=1;i<=3;i++){
const data=localStorage.getItem('rh_save_'+i);
const el=document.getElementById('slot'+i+'-info');
if(data){const s=JSON.parse(data);el.textContent=s.time+' | '+s.preview}
else{el.textContent='空'}}}

function handleSlot(n){
if(savePanelMode==='save'){saveToSlot(n)}
else{loadFromSlot(n)}}

function saveToSlot(n){
const preview=gameHistory.length>0?gameHistory[gameHistory.length-1].content.substring(0,20)+'...':'空';
const saveData={time:new Date().toLocaleString('zh-CN'),preview:preview,messages:messages,history:gameHistory,mood:currentMood};
localStorage.setItem('rh_save_'+n,JSON.stringify(saveData));
updateSlotInfo();
closeSavePanel()}

function loadFromSlot(n){
const data=localStorage.getItem('rh_save_'+n);
if(!data){alert('该档位为空');return}
const s=JSON.parse(data);
messages=s.messages;
gameHistory=s.history;
currentMood=s.mood||'calm';
setMood(currentMood);
document.getElementById('setup-screen').style.display='none';
document.getElementById('title-screen').style.display='none';
document.getElementById('game-container').style.display='flex';
document.getElementById('toolbar').style.display='flex';
closeSavePanel();
const lastScene=gameHistory.filter(h=>h.role==='assistant').pop();
if(lastScene){displayScene({speaker:lastScene.speaker||'',text:lastScene.content,mood:lastScene.mood||'calm',choices:['A. 继续','B. 观察周围','C. 回忆刚才发生的事','D. 自定义'],sound:'none'})}}

// 退出自动存档
window.addEventListener('beforeunload',()=>{
if(messages.length>0){
const preview=gameHistory.length>0?gameHistory[gameHistory.length-1].content.substring(0,20)+'...':'自动存档';
const saveData={time:'自动 '+new Date().toLocaleString('zh-CN'),preview:preview,messages:messages,history:gameHistory,mood:currentMood};
localStorage.setItem('rh_autosave',JSON.stringify(saveData))}});

</script>
</body>
